<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Chess Clock</title>
  <meta name="description" content="Professional tournament chess clock with vibrant multicolour design.">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0d0d1a">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- ╔═══════════════════════════════════════╗
       ║         LANDING SCREEN               ║
       ╚═══════════════════════════════════════╝ -->
  <section id="landing-screen" class="screen active">
    <div class="landing-content">

      <!-- King Piece SVG Logo -->
      <svg class="king-logo" viewBox="0 0 100 120" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="kg1" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%"   stop-color="#ff3cac"/>
            <stop offset="33%"  stop-color="#ffd200"/>
            <stop offset="66%"  stop-color="#00d2ff"/>
            <stop offset="100%" stop-color="#784ba0"/>
          </linearGradient>
        </defs>
        <!-- Crown cross top -->
        <rect x="45" y="0" width="10" height="28" rx="2" fill="url(#kg1)"/>
        <rect x="33" y="10" width="34" height="10" rx="2" fill="url(#kg1)"/>
        <!-- Crown body -->
        <path d="M20 42 L30 28 L50 38 L70 28 L80 42 Z" fill="url(#kg1)"/>
        <!-- Neck -->
        <rect x="30" y="42" width="40" height="12" rx="2" fill="url(#kg1)"/>
        <!-- Body -->
        <path d="M28 54 Q26 80 22 95 L78 95 Q74 80 72 54 Z" fill="url(#kg1)"/>
        <!-- Base -->
        <rect x="14" y="95" width="72" height="14" rx="5" fill="url(#kg1)"/>
        <!-- Shine overlay -->
        <path d="M35 28 L50 20 L50 38 Z" fill="rgba(255,255,255,0.2)"/>
      </svg>

      <h1 class="landing-title">Chess Clock</h1>
      <p class="landing-subtitle">Tournament Edition</p>

      <button id="open-setup-btn" class="btn-start">NEW GAME</button>

      <p class="landing-badge">♟ Professional · Fast · Precise</p>
    </div>
  </section>


  <!-- ╔═══════════════════════════════════════╗
       ║           GAME SCREEN                ║
       ╚═══════════════════════════════════════╝ -->
  <section id="game-screen" class="screen">

    <!-- Home Arrow -->
    <button id="home-arrow" class="home-arrow" aria-label="Back to menu">&#8592;</button>

    <div class="clock-body">

      <!-- Player 2 (top — rotated for face-to-face) -->
      <div class="player-panel" id="panel-2" data-player="2">
        <span class="tap-hint" id="hint-2">Waiting</span>
        <span class="player-name">Player 2</span>
        <div class="clock-display" id="clock-2">05:00</div>
        <span class="move-count" id="moves-2">0 moves</span>
      </div>

      <!-- Status LCD band -->
      <div class="lcd-band">
        <span class="lcd-status" id="status-hint">READY</span>
      </div>

      <!-- Player 1 (bottom) -->
      <div class="player-panel" id="panel-1" data-player="1">
        <span class="tap-hint" id="hint-1">Tap to start</span>
        <span class="player-name">Player 1</span>
        <div class="clock-display" id="clock-1">05:00</div>
        <span class="move-count" id="moves-1">0 moves</span>
      </div>

    </div>

    <!-- Control Bar -->
    <div class="ctrl-bar">
      <button class="ctrl-btn" id="minus-btn"  aria-label="Minus">−</button>
      <button class="ctrl-btn ctrl-pause" id="pause-btn" aria-label="Pause">⏸</button>
      <button class="ctrl-btn" id="reset-btn"  aria-label="Reset">↺</button>
      <button class="ctrl-btn" id="sound-btn"  aria-label="Sound">🔊</button>
      <button class="ctrl-btn" id="plus-btn"   aria-label="Plus">+</button>
    </div>

  </section>


  <!-- ╔═══════════════════════════════════════╗
       ║          SETUP OVERLAY               ║
       ╚═══════════════════════════════════════╝ -->
  <div id="setup-overlay" class="overlay">
    <div class="modal-card">
      <h2 class="modal-title">GAME SETUP</h2>

      <!-- Presets -->
      <div class="presets-grid" id="preset-grid">
        <button class="preset-btn" data-time="60">1 min</button>
        <button class="preset-btn" data-time="180">3 min</button>
        <button class="preset-btn selected" data-time="300">5 min</button>
        <button class="preset-btn" data-time="600">10 min</button>
        <button class="preset-btn" data-time="900">15 min</button>
        <button class="preset-btn" data-time="1800">30 min</button>
      </div>

      <!-- Custom inputs -->
      <div class="inputs-row">
        <div class="input-col">
          <label>Mins</label>
          <input class="num-input" type="number" id="minutes-input" value="5" min="0" max="99">
        </div>
        <div class="input-col">
          <label>Secs</label>
          <input class="num-input" type="number" id="seconds-input" value="0" min="0" max="59">
        </div>
      </div>

      <!-- Increment selector -->
      <div class="inc-label">Inc (sec)</div>
      <div class="inc-grid" id="inc-grid">
        <button class="inc-btn" data-inc="0">0s</button>
        <button class="inc-btn" data-inc="1">1s</button>
        <button class="inc-btn selected" data-inc="2">2s</button>
        <button class="inc-btn" data-inc="3">3s</button>
        <button class="inc-btn" data-inc="5">5s</button>
        <button class="inc-btn" data-inc="10">10s</button>
      </div>
      <!-- hidden input still read by app.js -->
      <input type="hidden" id="increment-input" value="2">

      <button id="start-game-btn" class="btn-primary">START GAME</button>
      <button id="close-setup-btn" class="btn-ghost">CANCEL</button>
    </div>
  </div>


  <!-- ╔═══════════════════════════════════════╗
       ║           WIN OVERLAY                ║
       ╚═══════════════════════════════════════╝ -->
  <div id="win-overlay" class="overlay">
    <div class="modal-card">
      <span class="win-icon">🏆</span>
      <h2 class="win-title" id="win-title">Player 1 Wins!</h2>
      <p class="win-sub" id="win-sub">Time's up for the opponent.</p>
      <button id="rematch-btn" class="btn-primary">REMATCH</button>
      <button id="menu-btn" class="btn-ghost">MAIN MENU</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
